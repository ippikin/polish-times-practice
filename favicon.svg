<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Outer circle matching the Polish Flag crimson accent -->
  <circle cx="16" cy="16" r="14" fill="#ffffff" stroke="#ff2e63" stroke-width="3"/>
  <!-- Center pin -->
  <circle cx="16" cy="16" r="2" fill="#1e1936"/>
  <!-- Hour hand pointing to 3 -->
  <line x1="16" y1="16" x2="22" y2="16" stroke="#1e1936" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand pointing to 12 -->
  <line x1="16" y1="16" x2="16" y2="8" stroke="#1e1936" stroke-width="2.5" stroke-linecap="round"/>
</svg>
